services:
  pg_api:
    image: postgres:16.2-alpine
    container_name: pg_api
    restart: always
    environment:
      POSTGRES_USER: api_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: api_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata_api_dev:/var/lib/postgresql/data
    networks:
      - app-network

  api:
    build: ./api
    ports:
      - "8000:8000"
    env_file:
      - ./api/.env
    environment:
      - HOST=0.0.0.0
      - DATABASE_URL=postgresql://api_user:password@pg_api:5432/api_dev
    depends_on:
      - pg_api
    networks:
      - app-network

  web:
    build: ./web
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - api
    networks:
      - app-network

volumes:
  pgdata_api_dev:

networks:
  app-network:
    driver: bridge
